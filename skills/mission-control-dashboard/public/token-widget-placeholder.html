<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Usage Widget</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }
        .widget-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            flex: 1;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .metric-label {
            font-size: 12px;
            opacity: 0.8;
        }
        .agent-list {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
        }
        .agent-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .agent-item:last-child {
            border-bottom: none;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            margin-right: 8px;
        }
        .update-time {
            text-align: center;
            font-size: 11px;
            opacity: 0.7;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header">
            <h3>🔥 Real-Time Token Usage</h3>
            <p style="font-size: 14px; margin: 0; opacity: 0.8;">Placeholder - Replace with Eric's widget</p>
        </div>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-value" id="total-tokens">0</div>
                <div class="metric-label">Total Tokens Today</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="total-cost">$0.00</div>
                <div class="metric-label">Total Cost Today</div>
            </div>
        </div>
        
        <div class="agent-list">
            <h4 style="margin-top: 0; margin-bottom: 15px;">Active Agents</h4>
            <div class="agent-item">
                <span><span class="status-indicator"></span>🤖 Magi (Orchestrator)</span>
                <span>1,247 tokens</span>
            </div>
            <div class="agent-item">
                <span><span class="status-indicator"></span>🛸 Beeb (Ops/Scout)</span>
                <span>834 tokens</span>
            </div>
            <div class="agent-item">
                <span><span class="status-indicator"></span>🤖 Marvin Jr. (Builder)</span>
                <span>592 tokens</span>
            </div>
        </div>
        
        <div class="update-time">
            Last updated: <span id="last-update">Just now</span>
        </div>
    </div>

    <script>
        // Simulate real-time updates
        function updateMetrics() {
            const totalTokens = Math.floor(Math.random() * 10000) + 5000;
            const totalCost = (totalTokens * 0.0001).toFixed(2);
            
            document.getElementById('total-tokens').textContent = totalTokens.toLocaleString();
            document.getElementById('total-cost').textContent = `$${totalCost}`;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }
        
        // Update every 5 seconds
        setInterval(updateMetrics, 5000);
        updateMetrics();
    </script>
</body>
</html>
